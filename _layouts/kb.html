<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Polderpijplijn support</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="icon" type="image/png" href="/assets/polder_favicon.png">
  <link rel="apple-touch-icon" href="/assets/polder_favicon.png">
  <link rel="stylesheet" href="/styles.css?v=3">
  <script src="/lang.js?v=2"></script>
  <script src="/email.js?v=1"></script>
</head>
<body>
  <div class="wrap">
    <div class="lang-switch" role="group" aria-label="Taal / Language">
      <button type="button" data-lang="nl">NL</button>
      <button type="button" data-lang="en">EN</button>
    </div>

    <a class="back-link" href="/support/">&lsaquo; Help &amp; support</a>

    <header class="hero">
      {% if page.title_nl or page.title_en %}
      {% if page.title_nl %}<h1 lang="nl">{{ page.title_nl }}</h1>{% endif %}
      {% if page.title_en %}<h1 lang="en">{{ page.title_en }}</h1>{% endif %}
      {% else %}<h1>{{ page.title }}</h1>{% endif %}
    </header>

    <article class="card kb-article">
      {{ content }}
    </article>

    <p class="footer">Contact: <span class="pp-email"><noscript>info [at] polderpijplijn [punt] nl</noscript></span></p>
  </div>
</body>
</html>
